syntax = "proto3";

option go_package="./services/grpc/proto";
option java_package="xyz.MarketServer";
package xyz.MarketServer;

message AssetItem {
  string guid = 1;
  string asset_name = 2;
  string asset_symbol = 3;
  string asset_logo = 4;
}

message SupportAssetRequest {
  string consumer_token = 1;
}

message SupportAssetResponse {
  uint64 return_code =1;
  string message = 2;
  repeated AssetItem asset = 3;
}

service MarketServices {
  rpc getSupportAsset(SupportAssetRequest) returns (SupportAssetResponse) {} //获取支持查询的资产列表
}